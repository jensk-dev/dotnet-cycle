name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Cycle.slnx --locked-mode

      - name: Build
        run: dotnet build Cycle.slnx --no-restore -c Release

      - name: Test
        run: dotnet test --solution Cycle.slnx --no-build -c Release

      - name: Pack
        run: dotnet pack Cycle.slnx --no-build -c Release

      - name: Push to NuGet
        run: dotnet nuget push "out/packages/Release/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbols
        run: dotnet nuget push "out/packages/Release/*.snupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: true
