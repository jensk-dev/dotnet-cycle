name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore packages
        run: dotnet restore Cycle.slnx --locked-mode

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build Cycle.slnx --no-restore -c Release --tl

      - name: Check formatting
        run: dotnet format Cycle.slnx --verify-no-changes --no-restore

      - name: Test with coverage
        run: >-
          dotnet coverage collect
          --settings coverage.settings.xml
          --output ${{ runner.temp }}/coverage/coverage.cobertura.xml
          --output-format cobertura
          "dotnet test --solution Cycle.slnx --no-build -c Release"

      - name: Generate coverage report
        run: >-
          dotnet reportgenerator
          "-reports:${{ runner.temp }}/coverage/coverage.cobertura.xml"
          "-targetdir:${{ runner.temp }}/coverage-report"
          "-reporttypes:HtmlInline_AzurePipelines;Cobertura;TextSummary"

      - name: Print coverage summary
        shell: bash
        run: cat "${{ runner.temp }}/coverage-report/Summary.txt"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: ${{ runner.temp }}/coverage-report/

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack Cycle.slnx --no-build -c Release

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: packages
          path: out/packages/Release/

  e2e:
    needs: build
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        dotnet-version: ['8.0.x', '10.0.x']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: packages/

      - name: Install and run cycle
        run: |
          dotnet tool install --global --add-source packages --prerelease cycle
          git diff --name-only HEAD~1 HEAD > changed-files.txt
          cycle Cycle.slnx affected.slnf --files changed-files.txt --log-level verbose

  stryker:
    if: false # stryker's mtp runner causes too much variance for it to be reliable. Once it stabilizes, stryker can be turned back on
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Cycle.slnx --locked-mode

      - name: Restore tools
        run: dotnet tool restore

      - name: Stryker - Cycle.Core
        run: >-
          dotnet stryker
          --project src/Cycle.Core/Cycle.Core.csproj
          --test-project tests/Cycle.Core.Tests/Cycle.Core.Tests.csproj
          --output ${{ runner.temp }}/stryker-core

      - name: Stryker - Cycle.Infrastructure
        run: >-
          dotnet stryker
          --project src/Cycle.Infrastructure/Cycle.Infrastructure.csproj
          --test-project tests/Cycle.Infrastructure.Tests/Cycle.Infrastructure.Tests.csproj
          --output ${{ runner.temp }}/stryker-infra

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: stryker-reports
          path: |
            ${{ runner.temp }}/stryker-core/
            ${{ runner.temp }}/stryker-infra/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, e2e]
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: out/packages/Release/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: out/packages/Release/*.nupkg

      - name: Push to NuGet
        run: >-
          dotnet nuget push "out/packages/Release/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            out/packages/Release/*.nupkg out/packages/Release/*.snupkg \
            --generate-notes --title "$TAG" $PRERELEASE_FLAG
